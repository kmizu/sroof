name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Dedicated kernel soundness gate ----
  kernel-soundness:
    name: Kernel soundness gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Run trusted-kernel soundness tests
        run: sbt kernel/test

  # ---- JVM: compile + test ----
  test:
    name: Test (JVM, Scala 3.3.6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Run tests
        run: sbt test

      - name: Check nat.sproof end-to-end
        run: sbt "cli/run check examples/nat.sproof"

      - name: Check int.sproof end-to-end
        run: sbt "cli/run check examples/int.sproof"

  # ---- Benchmarks: median + threshold gate ----
  benchmarks:
    name: Benchmarks (median thresholds)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Run benchmark suite (3 runs, median)
        run: python3 scripts/benchmark.py --runs 3 --thresholds benchmarks/thresholds.json --output benchmarks/results.json --fail-on-breach

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results.json
          if-no-files-found: error

  # ---- Scala Native: compile + link ----
  native:
    name: Native binary (Scala Native 0.5.10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Install LLVM / clang
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang lld libunwind-dev

      - name: Compile native modules
        run: sbt cliNative/compile

      - name: Link native binary
        run: sbt cliNative/nativeLink

      - name: Smoke-test native binary
        run: |
          BINARY=$(find cli-native/target -name "sproof-cli-native" -type f | head -1)
          echo "Binary: $BINARY ($(du -sh $BINARY | cut -f1))"
          $BINARY check examples/nat.sproof
          $BINARY check examples/int.sproof

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: sproof-cli-linux-amd64
          path: cli-native/target/scala-3.3.6/sproof-cli-native
          if-no-files-found: error

  # ---- sbt plugin: compile ----
  sbt-plugin:
    name: sbt plugin (Scala 2.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Compile sbt-sproof plugin
        run: cd sbt-sproof && sbt compile
